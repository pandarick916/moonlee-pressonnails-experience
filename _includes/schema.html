<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "Organization",
      "@id": "https://moonleehome.com/#organization",
      "name": "MOONLEE",
      "url": "https://moonleehome.com",
      "sameAs": [
        "https://www.pinterest.com/moonlee0317/",
        "https://www.instagram.com/moonleehome/",
        "https://www.tiktok.com/@moonlee5237"
      ]
    },
    {
      "@type": "WebSite",
      "@id": "https://knowledge.moonleehome.com/#website",
      "name": "MOONLEE Knowledge",
      "url": "https://knowledge.moonleehome.com",
      "publisher": { "@id": "https://moonleehome.com/#organization" }
    },
    {
      "@type": "BreadcrumbList",
      "@id": "{{ page.url | absolute_url }}#breadcrumb",
      "itemListElement": [
        {
          "@type": "ListItem",
          "position": 1,
          "item": {
            "@id": "https://knowledge.moonleehome.com",
            "name": "Knowledge Base"
          }
        }
        {% assign crumbs = page.url | split: '/' %}
        {% assign current_path = "https://knowledge.moonleehome.com" %}
        {% for crumb in crumbs offset: 1 %}
          {% if forloop.last == false %}
            {% assign current_path = current_path | append: '/' | append: crumb %}
            ,{
              "@type": "ListItem",
              "position": {{ forloop.index | plus: 1 }},
              "item": {
                "@id": "{{ current_path }}",
                "name": "{{ crumb | replace: '-', ' ' | capitalize }}"
              }
            }
          {% endif %}
        {% endfor %}
      ]
    }
    {% if page.layout == "post" %}
    ,{
      "@type": "Article",
      "@id": "{{ page.url | absolute_url }}#article",
      "headline": "{{ page.title }}",
      "image": "{{ page.image | default: 'https://moonleehome.com/cdn/shop/files/logo_moonlee.png' }}",
      "datePublished": "{{ page.date | date_to_xmlschema }}",
      "author": {
        "@type": "Person",
        "name": "Moon Lee",
        "jobTitle": "Founder",
        "url": "https://www.tiktok.com/@moonlee5237",
        "knowsAbout": ["press-on nails", "nail care", "nail health"],
        "sameAs": ["https://www.tiktok.com/@moonlee5237"]
      },
      "publisher": { "@id": "https://moonleehome.com/#organization" },
      "mainEntityOfPage": { "@id": "{{ page.url | absolute_url }}" }
    }
    {% if page.faqs %}
    ,{
      "@type": "FAQPage",
      "mainEntity": [
        {% for faq in page.faqs %}
        {
          "@type": "Question",
          "name": "{{ faq.question }}",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "{{ faq.answer }}"
          }
        }{% unless forloop.last %},{% endunless %}
        {% endfor %}
      ]
    }
    {% endif %}
    {% endif %}
  ]
}
</script>
